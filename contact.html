<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Islamic Tools Hub</title>
    <meta name="description" content="Contact Islamic Tools Hub for feedback, suggestions, or questions">
    <link rel="canonical" href="https://islamictoolshub.com/contact.html">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">Islamic Tools Hub</div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </div>
    </nav>

    <div class="ad-space ad-top"><div class="ad-placeholder">Ad Space</div></div>

    <section class="page-header">
        <div class="container">
            <h1>Contact Us</h1>
            <p>We'd love to hear from you</p>
        </div>
    </section>

    <main class="container">
        <div class="page-content">
            <div style="max-width: 600px; margin: 0 auto;">
                <div id="success-msg" class="success-message"></div>
                <div id="error-msg" class="error-message"></div>

                <form id="contactForm" style="background-color: #f9f9f9; padding: 2rem; border-radius: 8px;">
                    <div class="form-group">
                        <label for="name">Full Name *</label>
                        <input type="text" id="name" name="name" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address *</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div class="form-group">
                        <label for="subject">Subject *</label>
                        <input type="text" id="subject" name="subject" required>
                    </div>

                    <div class="form-group">
                        <label for="message">Message *</label>
                        <textarea id="message" name="message" required></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem;">Send Message</button>
                </form>

                <div style="margin-top: 3rem; padding: 2rem; background-color: #f0f7f3; border-radius: 8px;">
                    <h3>Other Ways to Reach Us</h3>
                    <p><strong>Email:</strong> info@islamictoolshub.com</p>
                    <p><strong>Response Time:</strong> We typically respond within 24-48 hours</p>
                </div>
            </div>
        </div>
    </main>

    <div class="ad-space ad-footer"><div class="ad-placeholder">Ad Space</div></div>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 Islamic Tools Hub</p>
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const subject = document.getElementById('subject').value;
            const message = document.getElementById('message').value;

            if (!name || !email || !subject || !message) {
                document.getElementById('error-msg').textContent = 'Please fill in all fields';
                document.getElementById('error-msg').classList.add('show');
                return;
            }

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                document.getElementById('error-msg').textContent = 'Please enter a valid email';
                document.getElementById('error-msg').classList.add('show');
                return;
            }

            document.getElementById('success-msg').textContent = 'Thank you for your message. We will get back to you soon!';
            document.getElementById('success-msg').classList.add('show');
            document.getElementById('contactForm').reset();

            setTimeout(() => {
                document.getElementById('success-msg').classList.remove('show');
            }, 3000);
        });
    </script>
</body>
</html>
